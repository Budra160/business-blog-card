<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Business Blog Card | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      :root{

        --primary-bg-color: #F2F5F9;
        --card-bg-color: #FFFFFF;
        --primary-text-color: #111729;
        --secondary-text-color: #4A5567;
        --avatar-bg-color: #F2F5F9;
        --card-border-radius: .75rem;
        --avatar-border-color: #F2F5F9;
      }

      @font-face {
        font-family: Lato;
        src: url("font/Lato-Regular.ttf"), url("font/Lato-Bold.ttf");
      }

      @font-face {
        font-family: Poppins;
        src: url(font/Poppins-Medium.ttf);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: Lato;
        background-color: var(--primary-bg-color);
      }

      h1, h2{
        font-family: Poppins;
        color: var(--primary-text-color);
        font-size: 1.5rem;
        letter-spacing: -5%;
        font-weight: 500;
      }

      h2{

        font-size: 1rem;
        letter-spacing: 0%;
        font-weight: 400;
      }

      p, article{
        color: var(--secondary-text-color);
        line-height: 1.5;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        color: rgb(55, 65, 81);
        text-decoration: underline;
      }

      .blog-card{
        display: flex;
        width:26rem;
        flex-direction: column;
        background-color: var(--card-bg-color);
        border-radius: var(--card-border-radius);
        overflow: hidden;
      }

      .card-img{
        position:relative;
      }

      .card-img-overlay{
        position: absolute;
        bottom:0%
      }

      .card-content{
        padding:0rem 2rem;
        padding-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: .75rem;
      }

      .avatar-wrapper{
        
        display:flex;
        gap: .75rem;
        border-top: 1px solid var(--avatar-border-color);
        padding: 1.5rem 2rem;
        align-items: center;
      }

      .avatar-content{

        display: flex;
        flex-direction: column;
        gap: .15rem;
      }

      .avatar-img{
        display: flex;
        align-items: center;
        justify-content: center;
        object-fit: cover;
        border-radius: 9999px;
        padding: .3rem;
        background-color: var(--avatar-border-color);
      }

      .avatar-img img, .avatar-img{
        border-radius: 9999px;
        width: 2.75rem;
        overflow: hidden;
      }

      @media screen and (width <= 640px) {
        
        .blog-card{

          width: 22rem;
        }

        h2{

          font-size: 1rem;
        }

        .avatar-title{

          font-size: .9rem
        }

        .card-content{
          padding: 0 1.6rem;
          padding-bottom: 1.6rem;
        }

        .avatar-wrapper{

          padding:1.1rem 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    
    <div class="blog-card">

      <div class="card-img-wrapper">
        <figure class="card-img">
          <img src="resources/hero-image-1.jpg" alt="Woman drinking a coffee with an another person">
          <img src="resources/white-overlay.svg" class="card-img-overlay" aria-label="none">
        </figure>
      </div>

      <div class="card-content">

        <h1>Perfect solution for small business</h1>
        <article>Small businesses need to generate leads to grow.
        You can use tools like Ringy.</article>

      </div>

      <div class="avatar-wrapper">

        <figure class="avatar-img">
          <img src="resources/avatar-image-business-card-1.png" alt="avatar-image">
        </figure>

        <div class="avatar-content">
          <H2>Amy Burgees</H2>
          <span class="avatar-title">Customer Manager, Solution Oy</span>
        </div>
      </div>
    </div>

    <div class="author-info">
      Coded by <a href="https://github.com/Budra160/business-blog-card" target="_blank">Josip Budrovčan</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>
